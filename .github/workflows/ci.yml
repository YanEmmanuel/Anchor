name: CI

on:
  push:
    tags-ignore:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CONFIGURATION: Release
  DOTNET_NOLOGO: true

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore Anchor.sln

      - name: Build
        run: dotnet build Anchor.sln -c "$CONFIGURATION" --no-restore

      - name: Test
        run: dotnet test Anchor.sln -c "$CONFIGURATION" --no-build --logger "trx;LogFileName=tests.trx" --results-directory artifacts/test-results

      - name: Upload test results
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: artifacts/test-results
          if-no-files-found: ignore
